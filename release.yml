name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DKIGU_VERSION=${{ steps.version.outputs.VERSION }}

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        run: |
          mkdir -p dist
          cp build/kigu-uart dist/
          cp MANUAL.md dist/
          cd dist && tar -czf ../kigu-uart-${{ steps.version.outputs.VERSION }}-linux-x86_64.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: kigu-uart-${{ steps.version.outputs.VERSION }}-linux-x86_64.tar.gz

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Configure
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DKIGU_VERSION=${{ steps.version.outputs.VERSION }}

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          cp build/Release/kigu-uart.exe dist/ 2>/dev/null || cp build/kigu-uart.exe dist/
          cp MANUAL.md dist/
          cd dist && 7z a ../kigu-uart-${{ steps.version.outputs.VERSION }}-windows-x86_64.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: kigu-uart-${{ steps.version.outputs.VERSION }}-windows-x86_64.zip

  release:
    name: Create Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-build

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: kigu-uart v${{ steps.version.outputs.VERSION }}
          draft: true
          files: |
            kigu-uart-${{ steps.version.outputs.VERSION }}-linux-x86_64.tar.gz
            kigu-uart-${{ steps.version.outputs.VERSION }}-windows-x86_64.zip
